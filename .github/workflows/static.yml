name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]

permissions:
  contents: write  # This is crucial for pushing to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Important for peaceiris/actions-gh-pages

      # Copy contact.vcf to public/assets
      - name: Setup assets
        run: |
          mkdir -p public/assets
          cp src/assets/contact.vcf public/assets/

      # Deploy to gh-pages
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true  # Preserve existing files in gh-pages
